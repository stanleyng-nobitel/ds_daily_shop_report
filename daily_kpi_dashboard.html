<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>日次KPIダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f1f5f9;
  --surface:#ffffff;
  --border:#e2e8f0;
  --text-primary:#0f172a;
  --text-secondary:#64748b;
  --text-muted:#94a3b8;
  --accent:#3b82f6;
  --accent-hover:#2563eb;
  --green:#16a34a;
  --green-bg:#dcfce7;
  --green-border:#86efac;
  --yellow:#d97706;
  --yellow-bg:#fef3c7;
  --yellow-border:#fcd34d;
  --red:#dc2626;
  --red-bg:#fee2e2;
  --red-border:#fca5a5;
  --header-from:#0f172a;
  --header-to:#1e3a5f;
  --radius:10px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.08);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -1px rgba(0,0,0,.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:var(--bg);color:var(--text-primary);font-size:13px;line-height:1.5;}

/* HEADER */
header{
  background:linear-gradient(135deg,var(--header-from) 0%,var(--header-to) 100%);
  color:#fff;padding:14px 24px;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;
  position:sticky;top:0;z-index:300;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}
.hdr-left h1{font-size:1.1rem;font-weight:700;letter-spacing:-.01em;}
.hdr-left p{font-size:.72rem;opacity:.65;margin-top:2px;font-weight:400;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.hdr-badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:3px 12px;font-size:.7rem;font-weight:600;color:rgba(255,255,255,.9);}

/* DATE BAR */
.date-bar{
  background:linear-gradient(to bottom,#1e293b,#0f172a);
  padding:8px 24px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;
  border-bottom:1px solid rgba(255,255,255,.08);
  position:sticky;top:53px;z-index:290;
}
.date-bar-label{font-size:.68rem;font-weight:700;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.06em;margin-right:4px;white-space:nowrap;}
.date-btn{
  padding:4px 13px;border:1px solid rgba(255,255,255,.18);border-radius:20px;
  font-size:.72rem;cursor:pointer;background:transparent;color:rgba(255,255,255,.6);
  font-weight:600;transition:all .15s;white-space:nowrap;
}
.date-btn:hover{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.35);}
.date-btn.active{
  background:var(--accent);color:#fff;border-color:var(--accent);
  box-shadow:0 2px 8px rgba(59,130,246,.45);
}

/* FILTER BAR */
.bar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:9px 24px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;
  position:sticky;top:101px;z-index:200;
  box-shadow:var(--shadow);
}
.cg{display:flex;align-items:center;gap:6px;}
.cg label{font-size:.72rem;font-weight:600;color:var(--text-secondary);white-space:nowrap;}
select,input{
  padding:5px 10px;border:1px solid var(--border);border-radius:7px;
  font-size:.75rem;outline:none;color:var(--text-primary);background:var(--bg);
  transition:border-color .15s,box-shadow .15s;
}
select:focus,input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15);}
.badge{
  background:linear-gradient(135deg,var(--accent),var(--accent-hover));
  color:#fff;border-radius:20px;padding:3px 12px;font-size:.7rem;font-weight:700;
  box-shadow:0 2px 4px rgba(59,130,246,.3);
}
.type-btns{display:flex;gap:5px;align-items:center;margin-left:4px;}
.type-label{font-size:.72rem;font-weight:600;color:var(--text-secondary);white-space:nowrap;}
.type-btn{
  padding:4px 12px;border:1.5px solid var(--border);border-radius:20px;
  font-size:.7rem;cursor:pointer;background:var(--surface);color:var(--text-secondary);
  font-weight:600;transition:all .15s;white-space:nowrap;
}
.type-btn:hover{border-color:var(--accent);color:var(--accent);}
.type-btn[data-t=""].active{background:#475569;border-color:#475569;color:#fff;}
.type-btn[data-t="既存"].active{background:#1d4ed8;border-color:#1d4ed8;color:#fff;}
.type-btn[data-t="既存新店"].active{background:#7c3aed;border-color:#7c3aed;color:#fff;}
.type-btn[data-t="新店"].active{background:#ea580c;border-color:#ea580c;color:#fff;}

/* MAIN */
.main{padding:16px 24px;max-width:1800px;margin:0 auto;}

/* KPI TABS */
.kpi-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center;padding:12px 16px;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);}
.kpi-nav-label{font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-right:4px;}
.kpi-tab{
  padding:5px 14px;border:1.5px solid var(--border);border-radius:20px;
  font-size:.73rem;cursor:pointer;background:transparent;color:var(--text-secondary);
  font-weight:600;transition:all .18s;white-space:nowrap;
}
.kpi-tab:hover{background:var(--bg);border-color:var(--accent);color:var(--accent);}
.kpi-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(59,130,246,.35);}
.kpi-tab.no-budget{border-style:dashed;}
.kpi-tab.no-budget.active{border-style:solid;}

/* KPI PANEL */
.kpi-panel{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-md);overflow:hidden;}
.kpi-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;background:linear-gradient(to right,#f8fafc,var(--surface));}
.kpi-title{font-size:1.05rem;font-weight:800;color:var(--text-primary);letter-spacing:-.02em;}
.kpi-unit{font-size:.72rem;color:var(--text-muted);margin-left:5px;font-weight:500;}
.kpi-date{font-size:.72rem;color:var(--text-muted);background:var(--bg);padding:3px 10px;border-radius:6px;border:1px solid var(--border);}
.kpi-no-budget{font-size:.68rem;color:var(--yellow);background:var(--yellow-bg);border:1px solid var(--yellow-border);padding:3px 10px;border-radius:6px;font-weight:600;}

/* KPI CARDS */
.kpi-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:16px 20px;border-bottom:1px solid var(--border);}
.kc{background:var(--bg);border-radius:9px;padding:12px 14px;border:1px solid var(--border);border-left:3px solid var(--accent);transition:box-shadow .15s;}
.kc:hover{box-shadow:var(--shadow-md);}
.kc.good{border-left-color:var(--green);background:#f0fdf4;border-color:var(--green-border);}
.kc.warn{border-left-color:var(--yellow);background:#fffbeb;border-color:var(--yellow-border);}
.kc.bad{border-left-color:var(--red);background:#fff5f5;border-color:var(--red-border);}
.kc-lbl{font-size:.65rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.kc-val{font-size:1.15rem;font-weight:800;color:var(--text-primary);line-height:1.2;}
.kc.good .kc-val{color:var(--green);}
.kc.warn .kc-val{color:var(--yellow);}
.kc.bad .kc-val{color:var(--red);}
.kc-sub{font-size:.65rem;color:var(--text-muted);margin-top:3px;}

/* CHARTS */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);}
@media(max-width:800px){.chart-row{grid-template-columns:1fr;}}
.cbox{background:var(--bg);border-radius:9px;padding:12px 14px;border:1px solid var(--border);}
.cbox h4{font-size:.7rem;color:var(--text-secondary);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.cwrap{position:relative;height:200px;}

/* TABLE */
.tbox{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.75rem;}
thead th{background:#f8fafc;color:var(--text-secondary);padding:9px 10px;text-align:right;font-weight:700;white-space:nowrap;cursor:pointer;border-bottom:2px solid var(--border);font-size:.68rem;text-transform:uppercase;letter-spacing:.04em;transition:background .12s;}
thead th:nth-child(-n+5){text-align:left;}
thead th:hover{background:#f1f5f9;color:var(--accent);}
thead th.sa::after{content:" ↑";color:var(--accent);}
thead th.sd::after{content:" ↓";color:var(--accent);}
tbody tr{transition:background .1s;}
tbody tr:nth-child(even){background:#fafbfc;}
tbody tr:hover{background:#eff6ff;}
tbody td{padding:8px 10px;text-align:right;border-bottom:1px solid #f1f5f9;color:var(--text-primary);}
tbody td:nth-child(-n+5){text-align:left;}
.rate-badge{display:inline-block;padding:2px 9px;border-radius:12px;font-size:.72rem;font-weight:800;letter-spacing:.02em;}
.rate-badge.rg{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.rate-badge.rw{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border);}
.rate-badge.rb{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.rg{color:var(--green);font-weight:700;}
.rw{color:var(--yellow);font-weight:700;}
.rb{color:var(--red);font-weight:700;}
.rn{color:var(--text-muted);}
.tag{border-radius:5px;padding:2px 7px;font-size:.63rem;font-weight:700;letter-spacing:.02em;white-space:nowrap;}
.ttag-既存{background:#dbeafe;color:#1e40af;}
.ttag-既存新店{background:#ede9fe;color:#5b21b6;}
.ttag-新店{background:#ffedd5;color:#9a3412;}
</style>
</head>

  {k:'sales',       lbl:'消化売上',     unit:'円',  fmt:'sales',  hasB:true},
  {k:'new_visitors',lbl:'新規来客者数', unit:'名',  fmt:'num',    hasB:true},

];

// Build date buttons
const dateBar=document.getElementById('dateBar');
DATES.forEach(d=>{
  const btn=document.createElement('button');
  btn.className='date-btn'+(d===activeDate?' active':'');
  // Format: 4/8(水) style
  const dt=new Date(d+'T00:00:00');
  const dow=['日','月','火','水','木','金','土'][dt.getDay()];
  btn.textContent=(dt.getMonth()+1)+'/'+(dt.getDate())+'('+dow+')';
  btn.title=d;
  btn.onclick=()=>{
    activeDate=d;
    RAW=ALL_DATA[d];
    filtered=[...RAW];
    document.querySelectorAll('.date-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('hdrSub').textContent=d+' | 直営店 | 予算対比：売上・新規来客・入会者数';
    go();
  };
  dateBar.appendChild(btn);
});

function fmt(v,type,unit){
  if(v==null||v==='')return'—';
  const n=parseFloat(v);
  if(isNaN(n))return'—';
  if(type==='sales')return n>=1e8?(n/1e8).toFixed(2)+'億':n>=1e4?(n/1e4).toFixed(1)+'万':n.toLocaleString();
  return n.toLocaleString();
}
function rate(a,b){
  if(a==null||b==null)return null;
  const fa=parseFloat(a),fb=parseFloat(b);
  if(isNaN(fa)||isNaN(fb)||fb===0)return null;
  return fa/fb*100;
}
function rClass(r){
  if(r==null)return'rn';
  if(r>=100)return'rg';
  if(r>=80)return'rw';
  return'rb';
}
function rCard(r){
  if(r==null)return'';
  if(r>=100)return'good';
  if(r>=80)return'warn';
  return'bad';
}

// Build KPI tabs
const nav=document.getElementById('kpiNav');
KPIS.forEach(kpi=>{
  const btn=document.createElement('button');
  btn.className='kpi-tab'+(kpi.k==='sales'?' active':'')+(kpi.hasB?'':' no-budget');
  btn.textContent=kpi.lbl;
  btn.onclick=()=>{
    document.querySelectorAll('.kpi-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeKpi=kpi.k;
    colSortF='a_'+kpi.k;
    colSortA=false;
    renderPanel();
  };
  nav.appendChild(btn);
});

function setType(el){
  activeType=el.dataset.t;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');go();
}

function go(){
  const area=document.getElementById('selArea').value;
  const am=document.getElementById('selAm').value;
  const search=document.getElementById('selShop').value.toLowerCase();
  filtered=RAW.filter(r=>
    (!area||r.region===area)&&(!am||r.am===am)&&
    (!search||r.shop_name.toLowerCase().includes(search))&&
    (!activeType||r.store_type===activeType)
  );
  document.getElementById('cnt').textContent=filtered.length+'店舗';
  document.getElementById('hdrCnt').textContent=filtered.length+' 店舗表示';
  renderPanel();
}

function cs(f){
  if(colSortF===f)colSortA=!colSortA; else{colSortF=f;colSortA=false;}
  renderTable();
}

function renderPanel(){
  const kpi=KPIS.find(x=>x.k===activeKpi);
  const ak='a_'+kpi.k, bk='b_'+kpi.k;
  const hasData=filtered.filter(r=>r[ak]!=null);
  const withB=hasData.filter(r=>r[bk]!=null&&parseFloat(r[bk])>0);
  const sumA=hasData.reduce((s,r)=>s+(parseFloat(r[ak])||0),0);
  const sumB=withB.reduce((s,r)=>s+(parseFloat(r[bk])||0),0);
  const ov=rate(sumA,sumB);
  const rs=ov!=null?ov.toFixed(1)+'%':null;
  const hit=withB.filter(r=>rate(r[ak],r[bk])>=100).length;

  document.getElementById('kpiPanel').innerHTML=`
    <div class="kpi-header">
      <div>
        <span class="kpi-title">${kpi.lbl}</span><span class="kpi-unit">[${kpi.unit}]</span>
        ${!kpi.hasB?'<span class="kpi-no-budget">実績のみ（予算なし）</span>':''}
      </div>
      <div class="kpi-date">${activeDate}</div>
    </div>
    <div class="kpi-cards">
      <div class="kc"><div class="kc-lbl">実績合計</div><div class="kc-val">${fmt(sumA,kpi.fmt,kpi.unit)}</div><div class="kc-sub">${hasData.length}店舗</div></div>
      ${kpi.hasB?`
      <div class="kc"><div class="kc-lbl">予算合計</div><div class="kc-val">${fmt(sumB,kpi.fmt,kpi.unit)}</div><div class="kc-sub">予算あり${withB.length}店</div></div>
      <div class="kc ${rCard(ov)}"><div class="kc-lbl">達成率</div><div class="kc-val">${rs||'—'}</div><div class="kc-sub">合計ベース</div></div>
      <div class="kc"><div class="kc-lbl">達成店舗数</div><div class="kc-val">${hit}/${withB.length}</div><div class="kc-sub">${withB.length>0?(hit/withB.length*100).toFixed(0)+'%':''}</div></div>
      `:''}
    </div>
    <div class="chart-row">
      <div class="cbox"><h4>上位10店（実績）</h4><div class="cwrap"><canvas id="cA"></canvas></div></div>
      ${kpi.hasB?'<div class="cbox"><h4>達成率分布（予算あり店舗）</h4><div class="cwrap"><canvas id="cB"></canvas></div></div>':
      '<div class="cbox"><h4>エリア別合計</h4><div class="cwrap"><canvas id="cB"></canvas></div></div>'}
    </div>
    <div class="tbox"><table>
      <thead><tr>
        <th onclick="cs('store_type')">区分</th>
        <th onclick="cs('shop_name')">店舗名</th>
        <th onclick="cs('region')">エリア</th>
        <th onclick="cs('am')">AM</th>
        <th onclick="cs('${ak}')">実績</th>
        ${kpi.hasB?`<th onclick="cs('${bk}')">予算</th><th onclick="cs('rate')">達成率</th><th onclick="cs('gap')">差額</th>`:''}
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table></div>`;

  const top10=[...hasData].sort((a,b)=>(parseFloat(b[ak])||0)-(parseFloat(a[ak])||0)).slice(0,10);
  if(chartA)chartA.destroy();
  chartA=new Chart(document.getElementById('cA'),{
    type:'bar',
    data:{
      labels:top10.map(r=>r.shop_name.length>8?r.shop_name.slice(0,8)+'…':r.shop_name),
      datasets:[
        {label:'実績',data:top10.map(r=>parseFloat(r[ak])||0),backgroundColor:'rgba(59,130,246,.8)',borderRadius:4},
        ...(kpi.hasB?[{label:'予算',data:top10.map(r=>parseFloat(r[bk])||0),backgroundColor:'rgba(203,213,225,.6)',borderRadius:4}]:[])
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10}}}},scales:{x:{ticks:{font:{size:9}}},y:{ticks:{font:{size:9}}}}}
  });

  if(chartB)chartB.destroy();
  if(kpi.hasB&&withB.length>0){
    const bins=[0,60,70,80,90,100,110,120,999];
    const lbls=['<60%','60-70%','70-80%','80-90%','90-100%','100-110%','110-120%','>120%'];
    const counts=new Array(8).fill(0);
    withB.forEach(r=>{
      const rv=rate(r[ak],r[bk]);
      if(rv==null)return;
      for(let i=0;i<bins.length-1;i++){if(rv>=bins[i]&&rv<bins[i+1]){counts[i]++;break;}}
    });
    chartB=new Chart(document.getElementById('cB'),{
      type:'bar',
      data:{labels:lbls,datasets:[{label:'店舗数',data:counts,backgroundColor:counts.map((_,i)=>i>=4?'rgba(22,163,74,.75)':i>=3?'rgba(217,119,6,.75)':'rgba(220,38,38,.75)'),borderRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9}}},y:{ticks:{font:{size:9},stepSize:1}}}}
    });
  } else {
    const byArea={};
    hasData.forEach(r=>{byArea[r.region]=(byArea[r.region]||0)+(parseFloat(r[ak])||0);});
    const akeys=Object.keys(byArea).sort((a,b)=>byArea[b]-byArea[a]).slice(0,10);
    chartB=new Chart(document.getElementById('cB'),{
      type:'bar',
      data:{labels:akeys,datasets:[{label:'実績',data:akeys.map(k=>byArea[k]),backgroundColor:'rgba(124,58,237,.7)',borderRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9}}},y:{ticks:{font:{size:9}}}}}
    });
  }

  renderTable();
}

function renderTable(){
  const kpi=KPIS.find(x=>x.k===activeKpi);
  const ak='a_'+kpi.k, bk='b_'+kpi.k;
  const sorted=[...filtered].sort((a,b)=>{
    let av=colSortF==='rate'?rate(a[ak],a[bk]):colSortF==='gap'?(parseFloat(a[ak]||0)-parseFloat(a[bk]||0)):(parseFloat(a[colSortF])||0);
    let bv=colSortF==='rate'?rate(b[ak],b[bk]):colSortF==='gap'?(parseFloat(b[ak]||0)-parseFloat(b[bk]||0)):(parseFloat(b[colSortF])||0);
    if(av==null)av=-Infinity;if(bv==null)bv=-Infinity;
    return colSortA?av-bv:bv-av;
  });
  const hdrs=document.querySelectorAll('thead th');
  hdrs.forEach(h=>h.classList.remove('sa','sd'));
  const flds=['store_type','shop_name','region','am',ak,...(kpi.hasB?[bk,'rate','gap']:[])];
  const idx=flds.indexOf(colSortF);
  if(idx>=0&&hdrs[idx])hdrs[idx].classList.add(colSortA?'sa':'sd');

  document.getElementById('tbody').innerHTML=sorted.map(r=>{
    const rv=rate(r[ak],r[bk]);
    const rc=rClass(rv);
    const gap=r[ak]!=null&&r[bk]!=null?parseFloat(r[ak])-parseFloat(r[bk]):null;
    return`<tr>
      <td><span class="tag ttag-${r.store_type}">${r.store_type||'—'}</span></td>
      <td style="text-align:left">${r.shop_name}</td>
      <td style="text-align:left">${r.region}</td>
      <td style="text-align:left">${r.am}</td>
      <td>${fmt(r[ak],kpi.fmt,kpi.unit)}</td>
      ${kpi.hasB?`<td>${fmt(r[bk],kpi.fmt,kpi.unit)}</td>
      <td>${rv!=null?'<span class="rate-badge '+rc+'">'+rv.toFixed(1)+'%</span>':'<span class="rn">—</span>'}</td>
      <td class="${gap!=null?(gap>=0?'rg':'rb'):'rn'}">${gap!=null?fmt(Math.abs(gap),kpi.fmt,kpi.unit)+'&nbsp;'+(gap>=0?'↑':'↓'):'—'}</td>`:''}
    </tr>`;
  }).join('');
}

// Init
document.getElementById('hdrSub').textContent=activeDate+' | 直営店 | 予算対比：売上・新規来客・入会者数';
go();
</script>
